name: Update HRRR cloud snapshot

on:
  schedule:
    # HRRR runs hourly. Minute 17 avoids the top-of-hour publication burst;
    # the builder walks back to the newest complete cycle when necessary.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hrrr-clouds
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: hrrr
          auto-activate-base: false
          channels: conda-forge
          python-version: '3.12'
      - name: Install NOAA wgrib2 processor
        shell: bash -el {0}
        run: conda install --yes --quiet wgrib2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate HRRR range and snapshot code
        run: node --test tests/hrrr-cloud-data.test.mjs
      - name: Build native HRRR cloud tile pyramid
        shell: bash -el {0}
        run: node scripts/build-hrrr-clouds.mjs --out dist/hrrr-clouds/hrrr-cloud-manifest.js
      - name: Validate generated classic scripts
        run: |
          find dist/hrrr-clouds -name '*.js' -print0 | xargs -0 -n1 node --check
          test "$(find dist/hrrr-clouds -name 'hrrr-cloud-l*.js' | wc -l)" -eq 59
          test "$(stat -c%s dist/hrrr-clouds/hrrr-cloud-manifest.js)" -lt 50000
          test "$(find dist/hrrr-clouds -name 'hrrr-cloud-l*.js' -size +8000000c | wc -l)" -eq 0
      - name: Replace stable release tile assets without growing Git history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view hrrr-cloud-data >/dev/null 2>&1; then
            gh release create hrrr-cloud-data \
              --title "Live HRRR cloud data" \
              --notes "Public, automatically replaced native-grid NOAA HRRR cloud tile pyramid for 3DWeather." \
              --prerelease
          fi
          gh release upload hrrr-cloud-data \
            dist/hrrr-clouds/*.js \
            --clobber
