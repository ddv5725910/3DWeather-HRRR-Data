name: Update HRRR cloud timeline

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-hrrr-clouds.yml'
      - 'scripts/build-hrrr-clouds.mjs'
      - 'tests/hrrr-cloud-data.test.mjs'
  schedule:
    # HRRR runs hourly. Minute 17 avoids the top-of-hour publication burst;
    # the builder walks back to the newest complete cycle when necessary.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hrrr-clouds
  # A 31-frame build is intentionally heavier than the old two-frame
  # snapshot. Never kill a nearly-complete publication at the next cron tick.
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATASET_TAG: hrrr-cloud-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: hrrr
          auto-activate-base: false
          channels: conda-forge
          python-version: '3.12'
      - name: Install NOAA wgrib2 processor
        shell: bash -el {0}
        run: conda install --yes --quiet wgrib2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate HRRR range and snapshot code
        run: node --test tests/hrrr-cloud-data.test.mjs
      - name: Build native HRRR cloud tile pyramid
        shell: bash -el {0}
        run: |
          node scripts/build-hrrr-clouds.mjs \
            --history-hours 12 \
            --forecast-hours 18 \
            --time-chunk-size 3 \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${DATASET_TAG}/" \
            --out dist/hrrr-clouds/hrrr-cloud-manifest.js
      - name: Validate generated classic scripts
        run: |
          find dist/hrrr-clouds -name '*.js' -print0 | xargs -0 -n1 node --check
          test "$(find dist/hrrr-clouds -name 'hrrr-cloud-t*-l*.js' | wc -l)" -eq 649
          test "$(stat -c%s dist/hrrr-clouds/hrrr-cloud-manifest.js)" -lt 200000
          test "$(find dist/hrrr-clouds -name 'hrrr-cloud-t*-l*.js' -size +12000000c | wc -l)" -eq 0
      - name: Publish an atomic versioned dataset and advance the stable manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${DATASET_TAG}" >/dev/null 2>&1; then
            gh release create "${DATASET_TAG}" \
              --title "HRRR cloud dataset ${DATASET_TAG}" \
              --notes "Immutable hourly NOAA HRRR cloud timeline used by the stable manifest." \
              --prerelease
          fi
          # GitHub applies a secondary limit when hundreds of assets are
          # uploaded concurrently. Keep each batch at the already-proven
          # 59-spatial-tile size, pace batches, and retry after cooldown.
          for time_chunk in $(seq -w 0 10); do
            assets=(dist/hrrr-clouds/hrrr-cloud-t"${time_chunk}"-l*.js)
            uploaded=false
            for attempt in 1 2 3 4 5; do
              if gh release upload "${DATASET_TAG}" "${assets[@]}" --clobber; then
                uploaded=true
                break
              fi
              sleep $((attempt * 45))
            done
            if [[ "${uploaded}" != true ]]; then
              echo "Failed to upload time chunk t${time_chunk} after retries" >&2
              exit 1
            fi
            sleep 10
          done
          gh release upload "${DATASET_TAG}" \
            dist/hrrr-clouds/hrrr-cloud-manifest.js \
            --clobber

          # Keep the just-published dataset plus the three newest predecessors.
          # GitHub's release createdAt follows the tagged commit; every hourly
          # tag points at the same data-repository commit, so createdAt ties and
          # can select the brand-new release for deletion. publishedAt is the
          # actual release publication time, and DATASET_TAG is excluded again
          # defensively even if ordering ever regresses.
          mapfile -t expired_tags < <(
            gh release list --limit 50 --json tagName,publishedAt \
              --jq "[.[] | select(.tagName | startswith(\"hrrr-cloud-\")) | select(.tagName != \"hrrr-cloud-data\") | select(.tagName != \"${DATASET_TAG}\")] | sort_by(.publishedAt) | reverse | .[3:] | .[].tagName"
          )
          for tag in "${expired_tags[@]}"; do
            [[ "${tag}" == "${DATASET_TAG}" ]] && continue
            gh release delete "${tag}" --yes --cleanup-tag
          done

          # Verify cleanup did not invalidate the immutable dataset before
          # advancing the stable pointer. There are 649 tiles plus one manifest.
          asset_count="$(
            gh release view "${DATASET_TAG}" --json assets --jq '.assets | length'
          )"
          test "${asset_count}" -eq 650
          gh release view "${DATASET_TAG}" --json assets \
            --jq '.assets[].name' |
            grep -qx 'hrrr-cloud-t04-l5-x0-y0.js'

          if ! gh release view hrrr-cloud-data >/dev/null 2>&1; then
            gh release create hrrr-cloud-data \
              --title "Live HRRR cloud data" \
              --notes "Stable manifest for the current public NOAA HRRR cloud timeline used by 3DWeather." \
              --prerelease
          fi
          # This is the final commit point. It runs only after the current
          # version survives cleanup and its complete asset inventory verifies.
          gh release upload hrrr-cloud-data \
            dist/hrrr-clouds/hrrr-cloud-manifest.js \
            --clobber
